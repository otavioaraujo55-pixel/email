<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contato</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  padding-top:100px;
}

.botao{
  display:inline-block;
  padding:18px 35px;
  font-size:20px;
  text-decoration:none;
  color:white;
  background:#007BFF;
  border-radius:10px;
}
</style>

<script>
function abrirEmail(){

  // tentativa Gmail
  window.location.href =
  "googlegmail://co?to=irismatos.adv@gmail.com&subject=Contato&body=Olá vim pelo Instagram";

  // fallback Outlook
  setTimeout(function(){
    window.location.href =
    "ms-outlook://compose?to=irismatos.adv@gmail.com&subject=Contato&body=Olá vim pelo Instagram";
  },800);

  // fallback mailto
  setTimeout(function(){
    window.location.href =
    "mailto:irismatos.adv@gmail.com?subject=Contato&body=Olá vim pelo Instagram";
  },1600);
}

window.onload = function(){
  setTimeout(abrirEmail,600);
}
</script>

</head>

<body>

<h2>Enviar Email</h2>

<p>Se não abrir automaticamente clique abaixo:</p>

<a class="botao" onclick="abrirEmail()">
Abrir Email
</a>

</body>
</html>
